name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test-cli:
    name: Test CLI (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: packages/cli
        run: npm ci

      - name: Run tests
        working-directory: packages/cli
        run: npm test

  lint-check:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm ci
        working-directory: packages/cli
      # Self-dogfooding: run EnvGuard against itself
      - name: EnvGuard self-check
        working-directory: packages/cli
        run: node src/index.js check || true
        # '|| true' — the CLI itself has no env vars to document,
        # but this confirms the binary runs without errors
